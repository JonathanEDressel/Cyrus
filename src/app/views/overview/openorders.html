<div class="page-container">
  <div class="overview-header">
    <h1 class="page-title">Open Orders</h1>
    <p class="page-subtitle" id="page-subtitle">Your active orders <span class="auto-refresh-label" id="refresh-label"></span></p>
  </div>

  <div class="alert alert-warning d-none" id="orders-error">
    <span id="orders-error-message"></span>
  </div>

  <div class="overview-section">
    <div class="section-header">
      <h2 class="section-title" id="orders-count-title">Orders</h2>
      <div class="orders-tab-strip" id="orders-tab-strip">
        <button class="rules-tab-btn active" data-tab="flow" title="Order flow chart">
          <i class="fa-solid fa-diagram-project"></i> Flow
        </button>
        <button class="rules-tab-btn" data-tab="table" title="Orders table">
          <i class="fa-solid fa-table-list"></i> Table
        </button>
      </div>
    </div>

    <!-- Table view (default) -->
    <div class="data-table-wrapper" id="orders-table-view">
      <table class="data-table" id="orders-table">
        <thead id="orders-thead">
          <tr>
            <th>Order ID</th>
            <th>Pair</th>
            <th>Side</th>
            <th>Type</th>
            <th>Price</th>
            <th>Volume</th>
            <th>Filled</th>
            <th>Status</th>
            <th>Opened</th>
          </tr>
        </thead>
        <tbody id="orders-tbody">
          <tr class="empty-row">
            <td colspan="9">Loading orders...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Flow view -->
    <div id="orders-flow-view" class="d-none">
      <div id="orders-flow-chart"></div>
    </div>
  </div>
</div>
